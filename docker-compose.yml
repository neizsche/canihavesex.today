services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: canihavesex
      POSTGRES_PASSWORD: canihavesex_secure_password_change_me
      POSTGRES_DB: canihavesex
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/neizsche/canihavesex:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://canihavesex:canihavesex_secure_password_change_me@db:5432/canihavesex
      DB_SSL: "false"
      NODE_ENV: production
      PORT: "1299"
      SELF_HOST: "true"
      COOKIE_SECRET: default_cookie_secret_please_change_in_production_32_chars
    ports:
      - "3112:1299"

volumes:
  db_data:
